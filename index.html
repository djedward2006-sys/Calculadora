<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sumar con Node.js</title>
</head>
<body>
    <h1>Prueba de Suma</h1>

    <label for="num1">Número 1:</label>
    <input type="number" id="num1" />

    <label for="num2">Número 2:</label>
    <input type="number" id="num2" />

    <br><br>

    <!-- Botones para cada tipo de suma -->
    <button onclick="sumarPathParams()">Sumar con Path Params</button>
    <button onclick="sumarBodyParams()">Sumar con Body Params</button>
    <button onclick="sumarQueryParams()">Sumar con Query Params</button>

    <h2>Resultado: <span id="resultado"></span></h2>

   
</body>
</html>
